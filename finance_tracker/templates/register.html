{% extends "layout.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-4">
            
            <div class="card shadow p-4">
                <h3 class="text-center mb-4">Sign Up</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" required=true name="email" class="form-control" placeholder="Enter email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" required=true name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                 

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Sign Up</button>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger mt-3">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                </form>
                <p>already have an account ? <a href="{%url 'signin'%}">login</a></p>
            </div>


        </div>
    </div>
{%endblock %}
